services:
  # ─── Backend: FastAPI + Pipecat ───────────────────────────────────────────
  - type: web
    name: sarvam-bot-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sarvam-bot-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TURN_URL
        sync: false
      - key: TURN_USERNAME
        sync: false
      - key: TURN_CREDENTIAL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: sarvam-bot-frontend
          type: web
          property: host
    plan: standard

  # ─── Frontend: Next.js ────────────────────────────────────────────────────
  - type: web
    name: sarvam-bot-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: sarvam-bot-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: sarvam-bot-backend
          type: web
          property: host
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    plan: standard
